<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>محامي بلوس</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Theme detection — runs synchronously before paint to prevent flash -->
    <script>
      (function () {
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function apply(dark) {
          if (dark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        }
        var stored = localStorage.getItem('theme');
        apply(stored === 'dark' || (!stored && mq.matches));
        mq.addEventListener('change', function (e) {
          if (!localStorage.getItem('theme')) apply(e.matches);
        });
      })();
    </script>
    <!-- Catch fatal JS errors that prevent React from mounting -->
    <script>
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          root.innerHTML = '<div dir="rtl" style="padding:32px;font-family:monospace;background:#1a1a2e;color:#e2c97e;min-height:100vh"><h1 style="font-size:20px;margin-bottom:12px">خطأ في التطبيق</h1><p style="color:#ff6b6b;margin-bottom:8px">' + (e.message || 'Unknown error') + '</p><pre style="font-size:11px;color:#aaa;white-space:pre-wrap;word-break:break-all">' + (e.filename || '') + ':' + (e.lineno || '') + '</pre></div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          root.innerHTML = '<div dir="rtl" style="padding:32px;font-family:monospace;background:#1a1a2e;color:#e2c97e;min-height:100vh"><h1 style="font-size:20px;margin-bottom:12px">خطأ في التطبيق</h1><p style="color:#ff6b6b;margin-bottom:8px">' + ((e.reason && e.reason.message) || String(e.reason) || 'Unhandled rejection') + '</p></div>';
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
