<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>محامي بلوس</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Theme detection — runs synchronously before paint to prevent flash -->
    <script>
      (function () {
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function apply(dark) {
          if (dark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        }
        var stored = localStorage.getItem('theme');
        apply(stored === 'dark' || (!stored && mq.matches));
        mq.addEventListener('change', function (e) {
          if (!localStorage.getItem('theme')) apply(e.matches);
        });
      })();
    </script>
    <!-- Global JS error catcher — surfaces fatal errors before React mounts -->
    <script>
      window.__jsErrors = [];
      window.addEventListener('error', function(e) {
        window.__jsErrors.push(e.message || String(e));
        var el = document.getElementById('js-error-display');
        if (!el) {
          el = document.createElement('div');
          el.id = 'js-error-display';
          el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#fee2e2;color:#7f1d1d;padding:1rem;font-family:monospace;font-size:0.8rem;direction:ltr;white-space:pre-wrap;border-bottom:2px solid #ef4444';
          document.body && document.body.appendChild(el);
        }
        el.textContent = '[JS Error] ' + (e.message || '') + '\n' + (e.filename || '') + ':' + (e.lineno || '');
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason ? (e.reason.message || String(e.reason)) : 'Unhandled promise rejection';
        window.__jsErrors.push(msg);
        var el = document.getElementById('js-error-display');
        if (!el) {
          el = document.createElement('div');
          el.id = 'js-error-display';
          el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#fee2e2;color:#7f1d1d;padding:1rem;font-family:monospace;font-size:0.8rem;direction:ltr;white-space:pre-wrap;border-bottom:2px solid #ef4444';
          document.body && document.body.appendChild(el);
        }
        el.textContent = '[Unhandled Rejection] ' + msg;
      });
    </script>
    <style>
      #pre-react-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: hsl(60, 14%, 97%); z-index: 9000;
      }
      .dark #pre-react-loader { background: hsl(222, 43%, 7%); }
      #pre-react-loader .spinner {
        width: 40px; height: 40px; border-radius: 50%;
        border: 4px solid #1a3a5c; border-top-color: transparent;
        animation: spin 0.8s linear infinite;
      }
      .dark #pre-react-loader .spinner { border-color: #5b9bd5; border-top-color: transparent; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Visible before React mounts — removed by main.tsx once React starts -->
    <div id="pre-react-loader" aria-hidden="true">
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
